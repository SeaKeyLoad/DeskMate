<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="auth-card">
        <h2>欢迎回来</h2>

        {% if error %}
        <div class="error-msg">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" placeholder="请输入用户名" required autocomplete="off">
            </div>

            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" placeholder="请输入密码" required>
            </div>

            <div style="text-align: left; margin-bottom: 20px; color: #ccc; font-size: 14px; display: flex; align-items: center;">
                <input type="checkbox" name="remember" id="remember" style="width: auto; margin-right: 8px;">
                <label for="remember" style="position: static; color: #ccc;">7天内自动登录</label>
            </div>

            <button type="submit" class="btn-primary">登 录</button>
        </form>

        <div class="auth-links">
            <p>还没有账号? <a href="{{ url_for('register') }}">立即注册</a></p>
        </div>
    </div>
</body>
</html>
